<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2対2 五目並べ</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>2対2 五目並べ</h1>

        <div class="info-panel">
            <div class="teams">
                <div class="team-box">
                    <h2>チームA</h2>
                    <div class="player-list">
                        <span class="player-tag team-a1">A1</span>
                        <span class="player-tag team-a2">A2</span>
                    </div>
                </div>

                <div class="team-box">
                    <h2>チームB</h2>
                    <div class="player-list">
                        <span class="player-tag team-b1">B1</span>
                        <span class="player-tag team-b2">B2</span>
                    </div>
                </div>
            </div>

            <div class="turn-box" id="turnText">現在の手番: A1（チームA）</div>
            <div class="status-box" id="statusText">ゲーム中</div>

            <div class="controls">
                <button id="resetBtn">リセット</button>
            </div>

            <div class="legend">
                A1 → A2 → B1 → B2 の順で石を置きます。<br>
                同じチームの石が5つ並べば勝利です。
            </div>
        </div>

        <div class="board-area">
            <div id="board" class="board">
                <div id="stoneLayer" class="stone-layer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
